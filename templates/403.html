{% extends 'core/base.html' %}
{% block title %}403 — Forbidden{% endblock %}

{% block content %}
<div class="page-hero">
  <div class="container">
    <div class="hero-accent"></div>
    <h1>403</h1>
    <p>You're not supposed to be here.</p>
  </div>
</div>

<div class="container" style="padding-bottom:3rem;text-align:center;padding-top:2rem;">
  <p style="font-size:4rem;margin-bottom:1rem;">🚫</p>
  <h2 style="margin-bottom:0.5rem;">Access Denied</h2>
  <p style="color:var(--text-muted);max-width:420px;margin:0 auto 2rem;">
    You don't have permission to view this page. If you think that's a mistake, talk to a staff member.
  </p>
  <div style="display:flex;gap:0.75rem;justify-content:center;flex-wrap:wrap;">
    <a href="/" class="btn btn-primary">Take Me Home</a>
    <a href="{% url 'auth:login' %}" class="btn btn-ghost">Login</a>
  </div>
</div>
{% endblock %}
